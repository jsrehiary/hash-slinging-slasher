<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Room Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-6xl">

        <h1 class="text-2xl font-bold mb-4">Room Checker</h1>

        <!-- RATE LIMIT INDICATOR -->
        <div class="mb-4 p-3 bg-blue-50 border border-blue-200 rounded flex justify-between items-center">
            <span class="text-sm text-gray-700">📊 API Calls: <span id="callCounter" class="font-bold text-blue-600">30/30</span> remaining this minute</span>
        </div>

        <!-- FORM -->
        <div class="flex gap-2 mb-4 flex-wrap">

            <select id="roomId" class="border p-2 rounded w-full md:w-1/3">
                <option value="">-- Pilih Ruangan --</option>
                <option value="all">Semua Ruangan</option>
                <option value="86">Teras Priangan: Outdoor Class</option>
                <option value="80">Teras Priangan: Pendopo Priangan</option>
                <option value="14">Teras Priangan: Joglo</option>
                <option value="74">GSG: Sayap Kanan Lantai 3</option>
                <option value="66">GSG: VIP C</option>
                <option value="61">GSG: Sayap Kiri Lantai 3</option>
                <option value="3">GSG: VIP B</option>
                <option value="2">GSG: VIP A</option>
            </select>

            <input id="startDate" type="date" class="border p-2 rounded" />
            <input id="endDate" type="date" class="border p-2 rounded" />

            <button onclick="getEvents()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Check
            </button>
            <button onclick="savePDF()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                Save as PDF
            </button>
        </div>

        <!-- RESULT -->
        <div id="pdfContent">
            <div id="result" class="space-y-3"></div>
        </div>

    </div>

    <script>
        // Environment-aware API base URL
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? "http://localhost:3000/rooms"
            : `${window.location.origin}/rooms`;

        // Call rate limiting
        const RATE_LIMIT = {
            maxCalls: 30,
            windowMs: 60000, // 1 minute
            calls: [],
            get remaining() {
                const now = Date.now();
                this.calls = this.calls.filter(time => now - time < this.windowMs);
                return Math.max(0, this.maxCalls - this.calls.length);
            },
            canMakeCall() {
                const now = Date.now();
                this.calls = this.calls.filter(time => now - time < this.windowMs);
                return this.calls.length < this.maxCalls;
            },
            recordCall() {
                this.calls.push(Date.now());
            }
        };

        // Show rate limit warning
        function showRateLimitWarning() {
            const remaining = RATE_LIMIT.remaining;
            const message = remaining === 0
                ? "⚠️ Call limit reached! (30 calls per minute)\n\nPlease wait before making another request."
                : `⚠️ Warning: Only ${remaining} calls remaining this minute!`;
            
            alert(message);
        }

        // Update call counter display
        function updateCallCounter() {
            const remaining = RATE_LIMIT.remaining;
            const counter = document.getElementById("callCounter");
            counter.textContent = `${remaining}/30`;
            
            // Change color based on remaining calls
            if (remaining === 0) {
                counter.className = "font-bold text-red-600";
            } else if (remaining <= 3) {
                counter.className = "font-bold text-orange-600";
            } else {
                counter.className = "font-bold text-blue-600";
            }
        }

        // Update counter every 100ms
        setInterval(updateCallCounter, 100);

        // default hari ini
        const today = new Date().toISOString().split("T")[0];
        document.getElementById("startDate").value = today;
        document.getElementById("endDate").value = today;

        function getDateRange(start, end) {
            const dates = [];
            let current = new Date(start);

            while (current <= new Date(end)) {
                dates.push(current.toISOString().split("T")[0]);
                current.setDate(current.getDate() + 1);
            }

            return dates;
        }

        async function getEvents() {
            const roomId = document.getElementById("roomId").value;
            const start = document.getElementById("startDate").value;
            const end = document.getElementById("endDate").value;
            const resultDiv = document.getElementById("result");

            if (!roomId || !start || !end) {
                resultDiv.innerHTML = "⚠️ Lengkapi input";
                return;
            }

            if (start > end) {
                resultDiv.innerHTML = "⚠️ Range tanggal tidak valid";
                return;
            }

            // Check rate limit
            if (!RATE_LIMIT.canMakeCall()) {
                showRateLimitWarning();
                return;
            }

            // Record the API call
            RATE_LIMIT.recordCall();

            resultDiv.innerHTML = "Loading...";

            try {

                // CASE: SEMUA RUANGAN (MATRIX)
                if (roomId === "all") {
                    const res = await fetch(`${API_BASE}/range?start=${start}&end=${end}`);
                    const json = await res.json();
                    const data = json.data;

                    const dates = getDateRange(start, end);

                    let table = `
                        <div class="overflow-x-auto">
                            <table style="page-break-inside: none;" class="table-auto border w-full text-sm">
                                <thead>
                                    <tr>
                                    <th class="border px-2 py-1">Ruangan</th>
                                    ${dates.map(d => `<th class="border px-2">${d.slice(5)}</th>`).join("")}
                                    </tr>
                                </thead>
                                <tbody>
                        `;

                    data.rooms.forEach(room => {
                        table += `<tr><td class="border px-2 font-medium">${room.room_name}</td>`;

                        dates.forEach(date => {
                            const events = room.availability[date];

                            table += `
                            <td class="border text-center align-top text-xs p-1">
                                ${events
                                    ? `
                                    <div class="text-red-600">🔴</div>
                                    ${events.map(ev => `
                                    <div class="text-[10px] text-gray-700">
                                        ${ev.start}-${ev.end}
                                    </div>
                                    <div class="text-[10px] text-gray-700">
                                        ${ev.acara}
                                    </div>
                                    `).join("")}
                                    `
                                    : `<div class="text-green-600">🟢</div>`
                                }
                            </td>
                                    `;
                        });

                        table += `</tr>`;
                    });

                    table += `</tbody></table></div>`;

                    resultDiv.innerHTML = table;
                    return;
                }

                const res = await fetch(`${API_BASE}/${roomId}/events?date=${start}`);
                const json = await res.json();
                const data = json.data;

                if (data.total_event === 0) {
                    resultDiv.innerHTML = "✅ Tidak ada event";
                    return;
                }

                resultDiv.innerHTML = data.events.map(event => `
      <div class="p-3 border rounded">
        <b>${event.acara}</b><br>
        ⏰ ${event.start} → ${event.end}
      </div>
    `).join("");

            } catch (err) {
                resultDiv.innerHTML = "❌ Error";
            }
        }
        function savePDF() {
            const element = document.getElementById("pdfContent");

            const opt = {
                margin: 0.5,
                filename: 'room-checker.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' } // landscape biar tabel muat
            };

            html2pdf().set(opt).from(element).save();
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>

</html>
