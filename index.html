<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Room Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-6xl">

        <h1 class="text-2xl font-bold mb-4">Room Checker</h1>

        <!-- FORM -->
        <div class="flex gap-2 mb-4 flex-wrap">

            <select id="roomId" class="border p-2 rounded w-full md:w-1/3">
                <option value="">-- Pilih Ruangan --</option>
                <option value="all">Semua Ruangan</option>
                <option value="86">Teras Priangan: Outdoor Class</option>
                <option value="80">Teras Priangan: Pendopo Priangan</option>
                <option value="14">Teras Priangan: Joglo</option>
                <option value="74">GSG: Sayap Kanan Lantai 3</option>
                <option value="66">GSG: VIP C</option>
                <option value="61">GSG: Sayap Kiri Lantai 3</option>
                <option value="3">GSG: VIP B</option>
                <option value="2">GSG: VIP A</option>
            </select>

            <input id="startDate" type="date" class="border p-2 rounded" />
            <input id="endDate" type="date" class="border p-2 rounded" />

            <button onclick="getEvents()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Check
            </button>
        </div>

        <!-- RESULT -->
        <div id="result" class="space-y-3"></div>

    </div>

    <script>
        const API_BASE = "http://localhost:3000/rooms";

        // default hari ini
        const today = new Date().toISOString().split("T")[0];
        document.getElementById("startDate").value = today;
        document.getElementById("endDate").value = today;

        function getDateRange(start, end) {
            const dates = [];
            let current = new Date(start);

            while (current <= new Date(end)) {
                dates.push(current.toISOString().split("T")[0]);
                current.setDate(current.getDate() + 1);
            }

            return dates;
        }

        async function getEvents() {
            const roomId = document.getElementById("roomId").value;
            const start = document.getElementById("startDate").value;
            const end = document.getElementById("endDate").value;
            const resultDiv = document.getElementById("result");

            if (!roomId || !start || !end) {
                resultDiv.innerHTML = "⚠️ Lengkapi input";
                return;
            }

            if (start > end) {
                resultDiv.innerHTML = "⚠️ Range tanggal tidak valid";
                return;
            }

            resultDiv.innerHTML = "Loading...";

            try {

                // 🔥 CASE: SEMUA RUANGAN (MATRIX)
                if (roomId === "all") {
                    const res = await fetch(`${API_BASE}/range?start=${start}&end=${end}`);
                    const json = await res.json();
                    const data = json.data;

                    const dates = getDateRange(start, end);

                    let table = `
        <div class="overflow-x-auto">
        <table class="table-auto border w-full text-sm">
          <thead>
            <tr>
              <th class="border px-2 py-1">Ruangan</th>
              ${dates.map(d => `<th class="border px-2">${d.slice(5)}</th>`).join("")}
            </tr>
          </thead>
          <tbody>
      `;

                    data.rooms.forEach(room => {
                        table += `<tr><td class="border px-2 font-medium">${room.room_name}</td>`;

                        dates.forEach(date => {
                            const events = room.availability[date];

                            table += `
            <td class="border text-center align-top text-xs p-1">
    ${
      events
        ? `
        <div class="text-red-600">🔴</div>
        ${events.map(ev => `
          <div class="text-[10px] text-gray-700">
            ${ev.start}-${ev.end}
          </div>
        `).join("")}
        `
        : `<div class="text-green-600">🟢</div>`
    }
  </td>
          `;
                        });

                        table += `</tr>`;
                    });

                    table += `</tbody></table></div>`;

                    resultDiv.innerHTML = table;
                    return;
                }

                // 🔥 CASE: SINGLE ROOM (range events)
                const res = await fetch(`${API_BASE}/${roomId}/events?date=${start}`);
                const json = await res.json();
                const data = json.data;

                if (data.total_event === 0) {
                    resultDiv.innerHTML = "✅ Tidak ada event";
                    return;
                }

                resultDiv.innerHTML = data.events.map(event => `
      <div class="p-3 border rounded">
        <b>${event.acara}</b><br>
        ⏰ ${event.start} → ${event.end}
      </div>
    `).join("");

            } catch (err) {
                resultDiv.innerHTML = "❌ Error";
            }
        }
    </script>

</body>

</html>
